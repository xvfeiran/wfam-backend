spring:
  application:
    name: aftermarket-parts-service
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 200
      hibernate.jdbc.fetch_size: 100
      hibernate.order_inserts: true        # 强制排序插入以启用批处理
      hibernate.order_updates: true        # 强制排序更新
      hibernate.batch_versioned_data: true # 批量更新版本化实体
  datasource:
    hikari:
      max-lifetime: 1200000   # 20 分钟（毫秒）
  data:
    rest:
#      default-media-type: application/json

server:
  servlet:
    context-path: /aftermarket-parts-management-system
  port: 8102

ocr:
  dify:
    base-url: ${OCR_DIFY_BASE_URL:http://10.8.157.24:8089/v1}
    api-key: ${OCR_DIFY_API_KEY:app-Ie53sAIxrvQx68kyvvb3a9Fo}
    input-variable: photo
    user: wfam-ocr

logging:
  charset:
    console: UTF-8
    file: UTF-8

spring:
  devtools:
    restart:
      enabled: false  # 禁用 DevTools 热重载，避免 Lombok Builder 类加载问题
